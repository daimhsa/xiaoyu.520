<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你是我的一生所爱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 心形飘落容器 -->
        <div class="hearts-container"></div>
        
        <!-- 主要内容 -->
        <div class="content">
            <h1 class="title">💕</h1>
            <button id="loveBtn" class="love-button">点击我</button>
            <p id="message" class="message hidden">你是我的一生所爱</p>
            
            <!-- 音乐播放器 -->
            <div class="music-player">
                <audio id="loveMusic" loop>
                    <source src="https://music.163.com/song/media/outer/url?id=1372407605.mp3" type="audio/mpeg">
                </audio>
                <button id="musicBtn" class="music-button">🎵 播放音乐</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
